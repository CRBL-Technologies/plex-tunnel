version: "3.9"

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    container_name: plextunnel-relay
    environment:
      - PLEXTUNNEL_RELAY_LISTEN=:8080
      - PLEXTUNNEL_RELAY_TUNNEL_LISTEN=:8081
      - PLEXTUNNEL_RELAY_DOMAIN=${PLEXTUNNEL_RELAY_DOMAIN}
      - PLEXTUNNEL_RELAY_TOKENS_FILE=/etc/plextunnel/tokens.json
    volumes:
      - ./tokens.json:/etc/plextunnel/tokens.json:ro
    restart: unless-stopped
    network_mode: host

  caddy:
    image: caddy:2
    container_name: plextunnel-caddy
    restart: unless-stopped
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - relay

volumes:
  caddy_data:
  caddy_config:
