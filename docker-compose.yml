services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: host

  plextunnel-client:
    image: ${PLEXTUNNEL_CLIENT_IMAGE:-ghcr.io/antoinecorbel7/plex-tunnel:latest}
    container_name: plextunnel-client
    environment:
      - PLEXTUNNEL_TOKEN=${PLEXTUNNEL_TOKEN}
      - PLEXTUNNEL_SERVER_URL=${PLEXTUNNEL_SERVER_URL}
      - PLEXTUNNEL_PLEX_TARGET=${PLEXTUNNEL_PLEX_TARGET:-http://127.0.0.1:32400}
      - PLEXTUNNEL_SUBDOMAIN=${PLEXTUNNEL_SUBDOMAIN:-}
      - PLEXTUNNEL_UI_LISTEN=${PLEXTUNNEL_UI_LISTEN:-127.0.0.1:9090}
    restart: unless-stopped
    network_mode: host
