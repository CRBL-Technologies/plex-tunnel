version: "3.9"

services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: host

  plextunnel-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: plextunnel-client
    environment:
      - PLEXTUNNEL_TOKEN=${PLEXTUNNEL_TOKEN}
      - PLEXTUNNEL_RELAY_URL=${PLEXTUNNEL_RELAY_URL}
      - PLEXTUNNEL_PLEX_TARGET=${PLEXTUNNEL_PLEX_TARGET:-http://127.0.0.1:32400}
      - PLEXTUNNEL_SUBDOMAIN=${PLEXTUNNEL_SUBDOMAIN:-}
    restart: unless-stopped
    network_mode: host
