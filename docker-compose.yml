services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    restart: unless-stopped
    network_mode: host
    environment:
      - PLEX_CLAIM=${PLEX_CLAIM:-claim-xxxxxxxxxxxxxxxxxxxx}
    volumes:
      - ${PLEX_CONFIG_DIR:-/opt/plex/config}:/config
      - ${PLEX_MEDIA_DIR:-/mnt/media}:/data

  plextunnel-client:
    image: ${PLEXTUNNEL_CLIENT_IMAGE:-ghcr.io/crbl-technologies/plex-tunnel:latest}
    container_name: plextunnel-client
    restart: unless-stopped
    network_mode: host
    user: "65532:65532"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    environment:
      - PLEXTUNNEL_TOKEN=${PLEXTUNNEL_TOKEN:-your-token-here}
      - PLEXTUNNEL_SERVER_URL=${PLEXTUNNEL_SERVER_URL:-wss://tunnel.example.com}
      - PLEXTUNNEL_PLEX_TARGET=${PLEXTUNNEL_PLEX_TARGET:-http://127.0.0.1:32400}
      - PLEXTUNNEL_SUBDOMAIN=${PLEXTUNNEL_SUBDOMAIN:-}
      - PLEXTUNNEL_UI_LISTEN=${PLEXTUNNEL_UI_LISTEN:-127.0.0.1:9090}
      - PLEXTUNNEL_LOG_LEVEL=${PLEXTUNNEL_LOG_LEVEL:-info}
