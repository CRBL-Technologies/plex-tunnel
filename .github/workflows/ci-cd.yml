name: Client CI/CD

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

  e2e-connectivity:
    name: E2E Connectivity
    runs-on: ubuntu-latest
    # Manual trigger only — requires a compatible server image.
    # Not a merge gate: the server image speaks a different protocol version
    # until the server repo is updated. Run locally with docker-compose.debug.yml.
    if: github.event_name == 'workflow_dispatch'
    needs: test
    timeout-minutes: 20
    env:
      PLEXTUNNEL_SERVER_IMAGE: ghcr.io/crbl-technologies/plex-tunnel-server:latest
      PLEXTUNNEL_SERVER_REPO_TOKEN: ${{ secrets.PLEXTUNNEL_SERVER_REPO_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run client+server debug e2e
        run: ./scripts/e2e-debug.sh

  docker:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image name
        run: |
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${repo_lc}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set image tags
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            {
              echo "IMAGE_TAGS<<EOF"
              echo "${IMAGE_NAME}:sha-${GITHUB_SHA}"
              echo "${IMAGE_NAME}:dev"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            {
              echo "IMAGE_TAGS<<EOF"
              echo "${IMAGE_NAME}:sha-${GITHUB_SHA}"
              echo "${IMAGE_NAME}:latest"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile.client
          push: true
          tags: ${{ env.IMAGE_TAGS }}
