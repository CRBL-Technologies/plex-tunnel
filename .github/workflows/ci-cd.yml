name: Client CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

  e2e-connectivity:
    name: E2E Connectivity
    runs-on: ubuntu-latest
    # Manual trigger only — requires a compatible server image.
    # Not a merge gate: the server image speaks a different protocol version
    # until the server repo is updated. Run locally with docker-compose.debug.yml.
    if: github.event_name == 'workflow_dispatch'
    needs: test
    timeout-minutes: 20
    env:
      PLEXTUNNEL_SERVER_IMAGE: ghcr.io/crbl-technologies/plex-tunnel-server:latest
      PLEXTUNNEL_SERVER_REPO_TOKEN: ${{ secrets.PLEXTUNNEL_SERVER_REPO_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run client+server debug e2e
        run: ./scripts/e2e-debug.sh

  docker:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${repo_lc}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
