name: Client CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  e2e-connectivity:
    name: E2E Connectivity
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    env:
      PLEXTUNNEL_SERVER_IMAGE: ghcr.io/antoinecorbel7/plex-tunnel-server:latest
      PLEXTUNNEL_SERVER_REPO_TOKEN: ${{ secrets.PLEXTUNNEL_SERVER_REPO_TOKEN || secrets.GHCR_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Run client+server debug e2e
        run: ./scripts/e2e-debug.sh

  docker:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, e2e-connectivity]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${repo_lc}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Trigger Portainer Stack Redeploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    env:
      PORTAINER_CLIENT_STACK_WEBHOOK_URL: ${{ secrets.PORTAINER_CLIENT_STACK_WEBHOOK_URL }}
    steps:
      - name: Check webhook configuration
        run: |
          if [ -n "${PORTAINER_CLIENT_STACK_WEBHOOK_URL}" ]; then
            echo "Portainer webhook secret is configured."
          else
            echo "::warning::PORTAINER_CLIENT_STACK_WEBHOOK_URL is empty or missing. Skipping stack redeploy."
          fi

      - name: Trigger webhook
        if: env.PORTAINER_CLIENT_STACK_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          status_code="$(
            curl --silent --show-error \
              --output /tmp/portainer-webhook-response.txt \
              --write-out '%{http_code}' \
              --max-time 30 \
              --request POST \
              "${PORTAINER_CLIENT_STACK_WEBHOOK_URL}" || true
          )"

          case "$status_code" in
            2??)
              echo "Portainer webhook triggered successfully (${status_code})."
              ;;
            *)
              echo "::warning::Portainer webhook returned HTTP ${status_code}. Deployment trigger skipped."
              if [ -s /tmp/portainer-webhook-response.txt ]; then
                echo "Webhook response:"
                cat /tmp/portainer-webhook-response.txt
              fi
              ;;
          esac
