name: Client CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  docker:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker secrets
        run: |
          test -n "${{ secrets.PRIVATE_DOCKER_REGISTRY }}"
          test -n "${{ secrets.PRIVATE_DOCKER_USERNAME }}"
          test -n "${{ secrets.PRIVATE_DOCKER_PASSWORD }}"
          test -n "${{ secrets.PRIVATE_DOCKER_IMAGE }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.PRIVATE_DOCKER_REGISTRY }}
          username: ${{ secrets.PRIVATE_DOCKER_USERNAME }}
          password: ${{ secrets.PRIVATE_DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          push: true
          tags: |
            ${{ secrets.PRIVATE_DOCKER_IMAGE }}:sha-${{ github.sha }}
            ${{ secrets.PRIVATE_DOCKER_IMAGE }}:latest
